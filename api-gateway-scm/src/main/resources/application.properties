spring.application.name=api-gateway-scm

server.port=9072

eureka.client.service-url.defaultZone=http://service-registry:8080/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.hostname=api-gateway
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/e_eiis
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4317

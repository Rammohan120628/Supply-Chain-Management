spring.application.name=api-gateway-scm

#local
#server.port=9080

#live
server.port=9071
server.servlet.context-path=/api-gateway-scm
#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true
	
#Local
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#Live
eureka.client.service-url.defaultZone=http://service-registry:8080/eureka/


eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.hostname=api-gateway-scm
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/e_eiis
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4317

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

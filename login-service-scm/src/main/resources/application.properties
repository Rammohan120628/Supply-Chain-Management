spring.application.name=login-service-scm

#local
#server.port=9090
#live
server.port=9072
server.servlet.context-path=/login-service-scm
 
#local 
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#live
eureka.client.service-url.defaultZone=http://service-registry:8080/service-registry-scm/eureka/
eureka.instance.prefer-ip-address=true

# DB configuration for DEV (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/e_eiis
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4317

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
